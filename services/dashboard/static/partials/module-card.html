<template id="module-card-template">
    <div class="module-card bg-gray-800 rounded-lg border border-gray-700 overflow-hidden card-interactive"
         x-data="{ expanded: false }">
        <div class="p-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="module-icon flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center"
                         :class="{
                             'bg-blue-600/20': true
                         }">
                        <svg class="w-6 h-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="module-name text-lg font-medium text-gray-200"></h3>
                        <p class="module-container-count text-sm text-gray-500"></p>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="module-health-indicator w-3 h-3 rounded-full animate-pulse-slow"></div>
                    <button
                        @click="expanded = !expanded"
                        class="p-1.5 rounded hover:bg-gray-700 transition-colors"
                        :aria-expanded="expanded"
                        aria-label="Toggle details"
                    >
                        <svg
                            class="w-5 h-5 text-gray-400 transform transition-transform"
                            :class="{ 'rotate-180': expanded }"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="mt-4 grid grid-cols-3 gap-4">
                <div class="bg-gray-700/50 rounded-lg p-3">
                    <div class="text-xs text-gray-500 uppercase tracking-wide">Memory</div>
                    <div class="module-memory mt-1 text-sm font-medium text-gray-200"></div>
                    <div class="mt-1 h-1.5 bg-gray-600 rounded-full overflow-hidden">
                        <div class="module-memory-bar h-full bg-blue-500 rounded-full transition-all"></div>
                    </div>
                </div>
                <div class="bg-gray-700/50 rounded-lg p-3">
                    <div class="text-xs text-gray-500 uppercase tracking-wide">CPU</div>
                    <div class="module-cpu mt-1 text-sm font-medium text-gray-200"></div>
                    <div class="mt-1 h-1.5 bg-gray-600 rounded-full overflow-hidden">
                        <div class="module-cpu-bar h-full bg-green-500 rounded-full transition-all"></div>
                    </div>
                </div>
                <div class="bg-gray-700/50 rounded-lg p-3">
                    <div class="text-xs text-gray-500 uppercase tracking-wide">Status</div>
                    <div class="module-status mt-1 text-sm font-medium"></div>
                </div>
            </div>
        </div>

        <div x-show="expanded" x-collapse class="border-t border-gray-700">
            <div class="p-4 space-y-3">
                <h4 class="text-sm font-medium text-gray-400">Containers</h4>
                <div class="module-containers space-y-2"></div>
            </div>
        </div>
    </div>
</template>

<template id="container-row-template">
    <div class="container-row flex items-center justify-between bg-gray-700/30 rounded-lg p-3 hover:bg-gray-700/50 transition-colors">
        <div class="flex items-center space-x-3">
            <div class="container-status-dot w-2 h-2 rounded-full"></div>
            <div>
                <div class="container-name text-sm font-medium text-gray-300"></div>
                <div class="container-image text-xs text-gray-500"></div>
            </div>
        </div>
        <div class="flex items-center space-x-4 text-xs text-gray-400">
            <span class="container-memory"></span>
            <span class="container-cpu"></span>
            <span class="container-state px-2 py-0.5 rounded text-xs font-medium"></span>
        </div>
    </div>
</template>

<script>
(function() {
    const PROFILE_ICONS = {
        postgresql: {
            color: 'blue',
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />'
        },
        redis: {
            color: 'red',
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />'
        },
        monitoring: {
            color: 'purple',
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />'
        },
        identity: {
            color: 'yellow',
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />'
        },
        secrets: {
            color: 'green',
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />'
        },
        backup: {
            color: 'orange',
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />'
        },
        default: {
            color: 'blue',
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />'
        }
    };

    const COLOR_CLASSES = {
        blue: { bg: 'bg-blue-600/20', text: 'text-blue-400' },
        red: { bg: 'bg-red-600/20', text: 'text-red-400' },
        purple: { bg: 'bg-purple-600/20', text: 'text-purple-400' },
        yellow: { bg: 'bg-yellow-600/20', text: 'text-yellow-400' },
        green: { bg: 'bg-green-600/20', text: 'text-green-400' },
        orange: { bg: 'bg-orange-600/20', text: 'text-orange-400' }
    };

    const HEALTH_CONFIG = {
        healthy: { dot: 'bg-green-500', text: 'text-green-400', label: 'Healthy' },
        unhealthy: { dot: 'bg-red-500', text: 'text-red-400', label: 'Unhealthy' },
        degraded: { dot: 'bg-yellow-500', text: 'text-yellow-400', label: 'Degraded' },
        unknown: { dot: 'bg-gray-500', text: 'text-gray-400', label: 'Unknown' }
    };

    function getProfileIcon(name) {
        const normalizedName = name.toLowerCase();
        return PROFILE_ICONS[normalizedName] || PROFILE_ICONS.default;
    }

    function formatMemory(mb) {
        if (mb >= 1024) {
            return (mb / 1024).toFixed(1) + ' GB';
        }
        return Math.round(mb) + ' MB';
    }

    function formatCpu(percent) {
        return percent.toFixed(1) + '%';
    }

    function getMemoryPercent(used, limit) {
        if (!limit || limit === 0) return 0;
        return Math.min(100, (used / limit) * 100);
    }

    function renderContainerRow(container) {
        const template = document.getElementById('container-row-template');
        const clone = template.content.cloneNode(true);
        const row = clone.querySelector('.container-row');

        const state = container.state || 'unknown';
        const health = container.health || 'unknown';

        let dotClass = 'bg-gray-500';
        if (state === 'running') {
            dotClass = health === 'healthy' ? 'bg-green-500' :
                       health === 'unhealthy' ? 'bg-red-500' : 'bg-yellow-500';
        } else if (state === 'exited') {
            dotClass = 'bg-red-500';
        }

        row.querySelector('.container-status-dot').className = `container-status-dot w-2 h-2 rounded-full ${dotClass}`;
        row.querySelector('.container-name').textContent = container.name || 'Unknown';
        row.querySelector('.container-image').textContent = container.image || '-';
        row.querySelector('.container-memory').textContent = container.memory_mb !== undefined
            ? formatMemory(container.memory_mb) : '-';
        row.querySelector('.container-cpu').textContent = container.cpu_percent !== undefined
            ? formatCpu(container.cpu_percent) : '-';

        const stateEl = row.querySelector('.container-state');
        stateEl.textContent = state;
        if (state === 'running') {
            stateEl.className = 'container-state px-2 py-0.5 rounded text-xs font-medium bg-green-500/20 text-green-400';
        } else if (state === 'exited') {
            stateEl.className = 'container-state px-2 py-0.5 rounded text-xs font-medium bg-red-500/20 text-red-400';
        } else {
            stateEl.className = 'container-state px-2 py-0.5 rounded text-xs font-medium bg-gray-500/20 text-gray-400';
        }

        return row;
    }

    window.renderModuleCard = function(profile) {
        const template = document.getElementById('module-card-template');
        const clone = template.content.cloneNode(true);
        const card = clone.querySelector('.module-card');

        const iconConfig = getProfileIcon(profile.name);
        const colorClasses = COLOR_CLASSES[iconConfig.color];
        const healthConfig = HEALTH_CONFIG[profile.health] || HEALTH_CONFIG.unknown;

        const iconContainer = card.querySelector('.module-icon');
        iconContainer.className = `module-icon flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center ${colorClasses.bg}`;
        iconContainer.querySelector('svg').className = `w-6 h-6 ${colorClasses.text}`;
        iconContainer.querySelector('svg').innerHTML = iconConfig.svg;

        card.querySelector('.module-name').textContent = profile.name;
        card.querySelector('.module-container-count').textContent =
            `${profile.container_count} container${profile.container_count !== 1 ? 's' : ''}`;

        const healthIndicator = card.querySelector('.module-health-indicator');
        healthIndicator.className = `module-health-indicator w-3 h-3 rounded-full animate-pulse-slow ${healthConfig.dot}`;

        const memoryPercent = getMemoryPercent(profile.memory_mb, profile.memory_limit_mb);
        card.querySelector('.module-memory').textContent =
            `${formatMemory(profile.memory_mb)} / ${formatMemory(profile.memory_limit_mb)}`;
        card.querySelector('.module-memory-bar').style.width = `${memoryPercent}%`;

        card.querySelector('.module-cpu').textContent = formatCpu(profile.cpu_percent);
        const cpuPercent = Math.min(100, profile.cpu_percent);
        card.querySelector('.module-cpu-bar').style.width = `${cpuPercent}%`;

        const statusEl = card.querySelector('.module-status');
        statusEl.textContent = healthConfig.label;
        statusEl.className = `module-status mt-1 text-sm font-medium ${healthConfig.text}`;

        const containersEl = card.querySelector('.module-containers');
        if (profile.containers && profile.containers.length > 0) {
            profile.containers.forEach(container => {
                containersEl.appendChild(renderContainerRow(container));
            });
        } else {
            containersEl.innerHTML = '<p class="text-sm text-gray-500 italic">No container details available</p>';
        }

        card.setAttribute('data-profile', profile.name);

        return card;
    };

    window.renderModuleCards = function(profiles, targetSelector) {
        const target = document.querySelector(targetSelector);
        if (!target) {
            console.error('Target element not found:', targetSelector);
            return;
        }

        target.innerHTML = '';

        if (!profiles || profiles.length === 0) {
            return;
        }

        profiles.forEach(profile => {
            target.appendChild(window.renderModuleCard(profile));
        });

        if (typeof Alpine !== 'undefined') {
            target.querySelectorAll('.module-card').forEach(card => {
                Alpine.initTree(card);
            });
        }
    };
})();
</script>
