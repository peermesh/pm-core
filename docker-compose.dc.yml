# ==============================================================
# Multi-Domain Override: distributedcreators.org
# ==============================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dc.yml up -d
#
# SSL strategy: HTTP challenge (default) via existing Traefik resolver.
# Migrate to DNS challenge only when wildcard cert requirements emerge.
# ==============================================================

services:
  dc-site:
    image: nginx:1.27-alpine
    container_name: pmdl_dc_site
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    volumes:
      - ./domains/distributedcreators.org/dist:/usr/share/nginx/html:ro
      - ./domains/distributedcreators.org/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - proxy-external

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

    labels:
      - "traefik.enable=true"

      # Apex domain
      - "traefik.http.routers.dc.rule=Host(`${DC_DOMAIN}`)"
      - "traefik.http.routers.dc.entrypoints=websecure"
      - "traefik.http.routers.dc.tls=true"
      - "traefik.http.routers.dc.tls.certresolver=letsencrypt"
      - "traefik.http.services.dc.loadbalancer.server.port=80"

      # www -> apex redirect
      - "traefik.http.routers.dc-www.rule=Host(`www.${DC_DOMAIN}`)"
      - "traefik.http.routers.dc-www.entrypoints=websecure"
      - "traefik.http.routers.dc-www.tls=true"
      - "traefik.http.routers.dc-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dc-www.middlewares=dc-www-redirect"
      - "traefik.http.middlewares.dc-www-redirect.redirectregex.regex=^https://www\\.(.*)"
      - "traefik.http.middlewares.dc-www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.dc-www-redirect.redirectregex.permanent=true"

networks:
  proxy-external:
    external: true
    name: pmdl_proxy-external
