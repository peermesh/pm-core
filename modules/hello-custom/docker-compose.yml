# ==============================================================
# Hello Custom Module - Docker Compose Configuration
# ==============================================================
# A complete, working example module for PeerMesh Core.
# Serves a static "Hello from PeerMesh" greeting page via nginx.
#
# This file demonstrates:
#   - Extending foundation base patterns (_service-lite)
#   - Pinned image digest for supply-chain security
#   - Traefik labels for HTTPS routing
#   - Health check configuration
#   - Resource limits via foundation inheritance
#   - Network isolation (proxy-external only)
#
# Prerequisites:
#   - Foundation stack running (Traefik, socket-proxy)
#   - DOMAIN environment variable set
#
# Deploy (standalone):
#   cd modules/hello-custom
#   docker compose up -d
#
# Deploy (with foundation):
#   docker compose -f docker-compose.yml \
#     -f modules/hello-custom/docker-compose.yml \
#     up -d
#
# Documentation: hello-custom/README.md
# ==============================================================

services:
  # ==========================================================================
  # Hello Module - Nginx Web Server
  # ==========================================================================
  # Serves a static greeting page. Extends _service-lite for resource limits
  # (256MB memory, 0.5 CPU) and standard logging configuration.

  hello-custom:
    # Extend from foundation base service for consistent resource limits
    # Options: _service-lite (256MB), _service-standard (512MB), _service-heavy (1GB)
    # CUSTOMIZE: Change the resource profile if your module needs more resources
    extends:
      file: ../../foundation/docker-compose.base.yml
      service: _service-lite

    # CUSTOMIZE: Replace with your module's image
    # Always pin the digest for supply-chain security
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10

    # CUSTOMIZE: Change to your module name
    container_name: hello-custom

    # Environment configuration
    # CUSTOMIZE: Add your module's environment variables
    environment:
      - HELLO_CUSTOM_GREETING=${HELLO_CUSTOM_GREETING:-Hello from PeerMesh Custom}
      - HELLO_CUSTOM_SUBDOMAIN=${HELLO_CUSTOM_SUBDOMAIN:-hello-custom}
      - HELLO_CUSTOM_NOTE=${HELLO_CUSTOM_NOTE:-Custom variant engaged}

    # Mount the static HTML content into nginx
    # CUSTOMIZE: Replace with your application's volume mounts
    volumes:
      - ./html:/usr/share/nginx/html
    command: /bin/sh -c '/usr/share/nginx/html/render-html.sh && exec nginx -g "daemon off;"'

    # Health check using wget (available in Alpine images)
    # CUSTOMIZE: Adjust the health check for your application's endpoint
    healthcheck:
      # Busybox wget is present in nginx:alpine; add a per-request timeout to avoid hangs
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--timeout=2", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Network: join proxy-external so Traefik can route traffic to this service
    # CUSTOMIZE: Add db-internal if your module needs database access
    networks:
      - proxy-external

    # Security hardening
    # CUSTOMIZE: Keep these unless your application requires specific capabilities
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # nginx entrypoint performs a chown on /var/cache/nginx; with all caps dropped
    # that fails. Add back only the minimal capability needed.
    cap_add:
      - CHOWN
      # nginx needs to drop privileges from root to nginx (uid/gid 101)
      # CAP_SETGID and CAP_SETUID are required for setgid/setuid syscalls
      - SETGID
      - SETUID

    # Traefik routing labels
    # CUSTOMIZE: Replace 'hello-custom' with your module name throughout
    #
    # NOTE: hello-custom uses a subdomain pattern (hello-custom.${DOMAIN}).
    # For a module that IS the primary app (e.g., peers.social serving its
    # root domain), use Host(`${DOMAIN}`) instead. See the module template
    # for both patterns side by side.
    labels:
      - "traefik.enable=true"

      # Router: HTTPS access at hello-custom.${DOMAIN}
      # CUSTOMIZE: Change the Host rule to your module's subdomain
      # For root-domain routing, replace with: Host(`${DOMAIN}`)
      - "traefik.http.routers.hello-custom.rule=Host(`${HELLO_CUSTOM_SUBDOMAIN:-hello-custom}.core.peermesh.org`)"
      - "traefik.http.routers.hello-custom.entrypoints=websecure"
      - "traefik.http.routers.hello-custom.tls.certresolver=letsencrypt"

      # Service: forward traffic to nginx port 80
      # CUSTOMIZE: Change the port to match your application
      - "traefik.http.services.hello-custom.loadbalancer.server.port=80"

      # OPTIONAL: Uncomment to require authentication via Authelia/auth middleware
      # - "traefik.http.routers.hello-custom.middlewares=auth@file"

