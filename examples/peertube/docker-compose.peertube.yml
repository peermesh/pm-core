# ==============================================================
# PeerTube - Docker Compose Fragment
# ==============================================================
# ActivityPub-federated video streaming platform
# P2P video delivery via WebTorrent/HLS
#
# Profile Dependency: PostgreSQL profile required
# Secrets are loaded from Docker secrets via entrypoint wrapper.
# ==============================================================

services:
  # =============================================================
  # PeerTube
  # =============================================================
  peertube:
    image: chocobozzz/peertube:production-bookworm
    container_name: pmdl_peertube
    entrypoint: ["/usr/local/bin/pmdl-peertube-entrypoint.sh"]

    profiles:
      - peertube
      - full

    depends_on:
      postgres:
        condition: service_healthy
      peertube-redis:
        condition: service_healthy

    environment:
      # Database
      PEERTUBE_DB_USERNAME: peertube
      PEERTUBE_DB_HOSTNAME: postgres
      PEERTUBE_DB_NAME: peertube

      # Redis
      PEERTUBE_REDIS_HOSTNAME: peertube-redis

      # Web server
      PEERTUBE_WEBSERVER_HOSTNAME: peertube.${DOMAIN}
      PEERTUBE_WEBSERVER_PORT: 443
      PEERTUBE_WEBSERVER_HTTPS: "true"

      # Trust proxy (behind Traefik)
      PEERTUBE_TRUST_PROXY: '["127.0.0.1", "loopback", "172.16.0.0/12"]'

      # Admin
      PEERTUBE_ADMIN_EMAIL: admin@${DOMAIN}

      # Disable telemetry
      PEERTUBE_INSTANCE_NO_TELEMETRY: "true"

    secrets:
      - peertube_db_password
      - peertube_secret

    volumes:
      - pmdl_peertube_data:/data
      - pmdl_peertube_config:/config
      - ./examples/peertube/pmdl-peertube-entrypoint.sh:/usr/local/bin/pmdl-peertube-entrypoint.sh:ro

    networks:
      - proxy-external
      - db-internal
      - peertube-internal

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:9000/api/v1/config || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 150s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    labels:
      - "traefik.enable=true"
      # Main router
      - "traefik.http.routers.peertube.rule=Host(`peertube.${DOMAIN}`)"
      - "traefik.http.routers.peertube.entrypoints=websecure"
      - "traefik.http.routers.peertube.tls=true"
      - "traefik.http.routers.peertube.tls.certresolver=letsencrypt"
      - "traefik.http.services.peertube.loadbalancer.server.port=9000"

  # =============================================================
  # Redis for PeerTube
  # =============================================================
  peertube-redis:
    image: redis:7-alpine
    container_name: pmdl_peertube_redis

    profiles:
      - peertube
      - full

    volumes:
      - pmdl_peertube_redis:/data

    networks:
      - peertube-internal

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ==============================================================
# Secrets
# ==============================================================

secrets:
  peertube_db_password:
    file: ./secrets/peertube_db_password
  peertube_secret:
    file: ./secrets/peertube_secret

# ==============================================================
# Volumes
# ==============================================================

volumes:
  pmdl_peertube_data:
    driver: local
  pmdl_peertube_config:
    driver: local
  pmdl_peertube_redis:
    driver: local

# ==============================================================
# Networks
# ==============================================================

networks:
  proxy-external:
    external: true
    name: pmdl_proxy-external

  db-internal:
    external: true
    name: pmdl_db-internal

  peertube-internal:
    driver: bridge
