  <!-- Head -->
  <circle cx="100" cy="72" r="32" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <!-- Body -->
  <path d="M50 180 C50 140 70 120 100 120 C130 120 150 140 150 180" fill="url(#bodyGrad)" stroke="#334155" stroke-width="1.5"/>
  <!-- Inner glow ring -->
