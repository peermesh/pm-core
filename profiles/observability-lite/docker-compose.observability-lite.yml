# ==============================================================
# Observability Lite Profile - Netdata + Uptime Kuma
# ==============================================================
# Purpose:
#   Low-ops observability baseline for single-VPS and small deployments.
#   This profile is the default observability recommendation.
#
# Activate with:
#   docker compose -f docker-compose.yml -f profiles/observability-lite/docker-compose.observability-lite.yml up -d
# ==============================================================

services:
  uptime-kuma:
    image: louislam/uptime-kuma@sha256:3d632903e6af34139a37f18055c4f1bfd9b7205ae1138f1e5e8940ddc1d176f9
    container_name: pmdl_uptime-kuma
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - pmdl_uptime_kuma_data:/app/data
    networks:
      - proxy-external
      - monitoring
    healthcheck:
      # Note: /app/extra/healthcheck is a compiled Go binary, not a JS file.
      # Use healthcheck.js which is the Node.js source version.
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.${DOMAIN}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

  netdata:
    image: netdata/netdata@sha256:4cbe33f6fc317a7f5c453c8b4997316e4e320a7abd8cc921cecba98f2a5cbcf5
    container_name: pmdl_netdata
    restart: unless-stopped
    hostname: "${HOSTNAME:-pmdl-host}"
    pid: host
    security_opt:
      - no-new-privileges:true
      - apparmor=unconfined
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
    volumes:
      - pmdl_netdata_config:/etc/netdata
      - pmdl_netdata_lib:/var/lib/netdata
      - pmdl_netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy-external
      - monitoring
    healthcheck:
      # Note: newer Netdata images do not include wget; use curl instead.
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:19999/api/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netdata.rule=Host(`netdata.${DOMAIN}`)"
      - "traefik.http.routers.netdata.entrypoints=websecure"
      - "traefik.http.routers.netdata.tls.certresolver=letsencrypt"
      - "traefik.http.services.netdata.loadbalancer.server.port=19999"

volumes:
  pmdl_uptime_kuma_data:
    driver: local
    name: pmdl_uptime_kuma_data
  pmdl_netdata_config:
    driver: local
    name: pmdl_netdata_config
  pmdl_netdata_lib:
    driver: local
    name: pmdl_netdata_lib
  pmdl_netdata_cache:
    driver: local
    name: pmdl_netdata_cache

networks:
  proxy-external:
    external: true
    name: pmdl_proxy-external
  monitoring:
    name: pmdl_monitoring
