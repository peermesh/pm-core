# ==============================================================
# Secrets (Optional)
# ==============================================================
# Uncomment to use file-based secrets (recommended over env vars).
# Top-level defines the source; service-level sets mode: 0444
# for non-root containers. See module-template for full pattern.
#
# secrets:
#   hello_custom_db_password:
#     file: ./secrets/hello_custom_db_password

# ==============================================================
# Volumes (Optional)
# ==============================================================
# Uncomment if your module needs persistent data storage.
#
# volumes:
#   hello-custom-data:
#     name: hello-custom-data
#   hello-custom-db-data:
#     name: hello-custom-db-data

# ==============================================================
# Networks
# ==============================================================
# Declare external networks used by this module.
# These are created by the foundation stack.

networks:
  proxy-external:
    external: true
    name: pmdl_proxy-external

  # OPTIONAL: Uncomment if your module needs database access
  # db-internal:
  #   external: true
  #   name: pmdl_db-internal
