# ==============================================================
# PeerMesh Core - Root Compose File
# ==============================================================
#
# PROFILES AVAILABLE:
#   Foundation (always on):
#     - Traefik reverse proxy
#     - Docker socket proxy
#     - Networks
#
#   Supporting Tech (select what your app needs):
#     postgresql  - PostgreSQL 16 with pgvector
#     mysql       - MySQL 8.0
#     mongodb     - MongoDB 6.0
#     redis       - Redis 7 / Valkey
#     minio       - S3-compatible object storage
#
#   Feature Profiles:
#     monitoring  - Prometheus, Grafana, Loki
#     backup      - Automated backup container
#     dev         - Adminer, Mailhog, debug tools
#
# ACTIVATION:
#   1. Copy .env.example to .env
#   2. Run ./scripts/generate-secrets.sh
#   3. Set COMPOSE_PROFILES=postgresql,redis,backup
#   4. Run: docker compose up -d
#
# ==============================================================

# --------------------------------------------------------------
# Extension Fields (Reusable Configurations)
# --------------------------------------------------------------

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 60s

x-healthcheck-database: &healthcheck-database
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 120s

x-healthcheck-app: &healthcheck-app
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 90s

x-security-opts: &security-opts
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-restart-policy: &restart-policy
  restart: unless-stopped

# Combined base for secured services (security-opts + restart-policy)
x-secured-service: &secured-service
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped

# Traefik label presets
x-traefik-https: &traefik-https-labels
  traefik.enable: "true"
  traefik.http.routers.${SERVICE_NAME:-app}.entrypoints: websecure
  traefik.http.routers.${SERVICE_NAME:-app}.tls.certresolver: letsencrypt

# --------------------------------------------------------------
# SERVICES
# --------------------------------------------------------------

services:
  # ============================================================
  # FOUNDATION LAYER (Always On)
  # ============================================================

  # Docker Socket Proxy - Secure Docker API access for Traefik
  socket-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: pmdl_socket-proxy
    restart: unless-stopped
    # Exception: Must run as root to access Docker socket
    user: "0:0"
    # Security: cap_drop + no-new-privileges but NOT read_only.
    # Gotcha #12: haproxy entrypoint generates config from template at startup;
    # mounting tmpfs or enabling read_only wipes the baked-in template.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      # Read-only access for service discovery
      CONTAINERS: 1
      NETWORKS: 1
      INFO: 1
      VERSION: 1
      # Everything else disabled
      SERVICES: 0
      TASKS: 0
      SWARM: 0
      VOLUMES: 1
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      IMAGES: 1
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SESSION: 0
      SYSTEM: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2375 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

  # Traefik Reverse Proxy
  # NOTE: Using v2.11 instead of v3.2 due to Docker API compatibility issue.
  # Traefik v3.2 uses Docker API client v1.24, but Docker 29.x requires minimum v1.44.
  # Error: "client version 1.24 is too old. Minimum supported API version is 1.44"
  # See: docs/decisions/0001-traefik-reverse-proxy.md
  traefik:
    image: traefik@sha256:a6e718e8f84d4e45282a53a8e7338ab74372abac3ff78f9261a015bc8b45be95
    container_name: pmdl_traefik
    <<: *secured-service
    # Non-root disabled: Traefik v2.11 ACME certificate storage requires root.
    # Blocked by circular dependency: non-root needs v3, v3.2 requires Docker API v1.44+
    # but Docker 29.x minimum is v1.44 while Traefik v3.2 client sends v1.24.
    # Mitigation: cap_drop ALL + no-new-privileges limits blast radius.
    # See: .dev/ai/reports/2026-03-20-architectural-audit-and-gap-synthesis.md
    # user: "65534:65534"
    read_only: true
    tmpfs:
      - /tmp:size=32m
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      socket-proxy:
        condition: service_started
    # Force direct binary entrypoint so image wrapper does not rewrite args.
    entrypoint: ["traefik"]
    command:
      # Docker provider via socket-proxy
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=pmdl_proxy-external"

      # File provider for dynamic config (security headers, etc.)
      - "--providers.file.directory=/etc/traefik"
      - "--providers.file.watch=true"

      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.middlewares=security-headers@file"
      - "--entrypoints.matrix-fed.address=:8448"
      - "--entrypoints.traefik.address=:8080"

      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      # TLS certificates via Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.caserver=${TRAEFIK_ACME_CASERVER:-}"

      # Dashboard (localhost only by default)
      - "--api.dashboard=true"
      - "--api.insecure=true"  # Required for local dashboard access

      # Health check endpoint
      - "--ping=true"
      - "--ping.entrypoint=traefik"

      # Logging
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      - "--accesslog=true"
      - "--accesslog.format=json"

    ports:
      - "${TRAEFIK_WEB_PORT:-18000}:80"
      - "${TRAEFIK_WEBSECURE_PORT:-18001}:443"
      - "${TRAEFIK_MATRIX_FED_PORT:-18002}:8448"
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-18003}:8080"  # Dashboard on localhost only

    volumes:
      - pmdl_traefik_acme:/acme
      - ./configs/traefik:/etc/traefik:ro

    networks:
      - socket-proxy
      - proxy-external

    logging: *default-logging

    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    labels:
      - "traefik.enable=true"
      # Dashboard router (optional, for remote access)
      # Dashboard router (optional, for remote access)
      # SECURITY: Requires TRAEFIK_DASHBOARD_AUTH to be set with valid htpasswd credentials.
      # When unset/empty, the default is an unparseable bcrypt hash that prevents Traefik
      # from panicking (index out of range on empty users list) while denying all logins.
      # Set a real value via: htpasswd -nb admin your_secure_password
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth,dashboard-auth-ratelimit"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-__disabled__:$$2y$$10$$xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}"
      - "traefik.http.middlewares.dashboard-auth.basicauth.realm=Traefik Dashboard"
      # Rate limit on dashboard auth to prevent brute-force (HIGH-003)
      - "traefik.http.middlewares.dashboard-auth-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.dashboard-auth-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.dashboard-auth-ratelimit.ratelimit.period=1m"

  # Dashboard - System monitoring and module registry
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    image: pmdl/dashboard:${DASHBOARD_IMAGE_TAG:-0.1.0}
    container_name: pmdl_dashboard
    <<: *secured-service
    user: "1000:1000"
    environment:
      - PORT=8080
      - DOCKER_HOST=tcp://socket-proxy:2375
      # Core Dashboard auth (see docs/GLOSSARY.md for naming)
      - DOCKERLAB_USERNAME=${DOCKERLAB_USERNAME:-${DASHBOARD_USERNAME:-admin}}
      - DOCKERLAB_PASSWORD=${DOCKERLAB_PASSWORD:-${DASHBOARD_PASSWORD:-}}
      - DOCKERLAB_DEMO_MODE=${DOCKERLAB_DEMO_MODE:-${DEMO_MODE:-false}}
    depends_on:
      socket-proxy:
        condition: service_started
      traefik:
        condition: service_healthy
    networks:
      - socket-proxy
      - proxy-external
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-app
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    labels:
      - "traefik.enable=true"
      # Router configuration
      - "traefik.http.routers.dashboard.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8080"
      # Security middlewares - auth handled by Go app, not Traefik
      - "traefik.http.routers.dashboard.middlewares=dashboard-security,dashboard-ratelimit"
      # Security Headers
      - "traefik.http.middlewares.dashboard-security.headers.browserxssfilter=true"
      - "traefik.http.middlewares.dashboard-security.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.dashboard-security.headers.frameDeny=true"
      - "traefik.http.middlewares.dashboard-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.dashboard-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.dashboard-security.headers.stsPreload=true"
      - "traefik.http.middlewares.dashboard-security.headers.customResponseHeaders.X-Robots-Tag=noindex,nofollow"
      - "traefik.http.middlewares.dashboard-security.headers.customResponseHeaders.X-Permitted-Cross-Domain-Policies=none"
      # Rate Limiting (protect against brute force)
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.burst=20"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.period=1m"

  # ============================================================
  # SUPPORTING TECH PROFILES
  # ============================================================

  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    container_name: pmdl_postgres
    profiles:
      - postgresql
    restart: unless-stopped  # PostgreSQL needs to run its entrypoint as root initially
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /run/postgresql:size=16m
    secrets:
      - postgres_password
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE:-768MB}"
      - "-c"
      - "work_mem=${POSTGRES_WORK_MEM:-4MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-100}"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
    volumes:
      - pmdl_postgres_data:/var/lib/postgresql/data
      - ./profiles/postgresql/init-scripts:/docker-entrypoint-initdb.d:ro
    shm_size: 256mb
    healthcheck:
      <<: *healthcheck-database
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
    networks:
      - db-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1G}
        reservations:
          memory: ${POSTGRES_MEMORY_RESERVATION:-512M}

  # MySQL 8.0
  mysql:
    image: mysql@sha256:64756cc92f707eb504496d774353990bcb0f6999ddf598b6ad188f2da66bd000
    container_name: pmdl_mysql
    profiles:
      - mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /run/mysqld:size=16m
    secrets:
      - mysql_root_password
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    command:
      - "--innodb-buffer-pool-size=${MYSQL_BUFFER_POOL_SIZE:-256M}"
      - "--max-connections=${MYSQL_MAX_CONNECTIONS:-100}"
    volumes:
      - pmdl_mysql_data:/var/lib/mysql
      - ./profiles/mysql/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *healthcheck-database
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    networks:
      - db-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${MYSQL_MEMORY_LIMIT:-1G}
        reservations:
          memory: ${MYSQL_MEMORY_RESERVATION:-512M}

  # MongoDB 6.0
  mongodb:
    image: mongo@sha256:03cda579c8caad6573cb98c2b3d5ff5ead452a6450561129b89595b4b9c18de2
    container_name: pmdl_mongodb
    profiles:
      - mongodb
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:size=64m
    secrets:
      - mongodb_root_password
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongodb_root_password
    command: ["--wiredTigerCacheSizeGB", "${MONGODB_CACHE_SIZE_GB:-0.25}"]
    volumes:
      - pmdl_mongodb_data:/data/db
      - ./profiles/mongodb/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *healthcheck-database
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
    networks:
      - db-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${MONGODB_MEMORY_LIMIT:-1G}
        reservations:
          memory: ${MONGODB_MEMORY_RESERVATION:-512M}

  # Redis 7
  redis:
    image: redis@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: pmdl_redis
    profiles:
      - redis
    <<: *secured-service
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp:size=32m
    secrets:
      - source: redis_password
        mode: 0444  # Redis runs as non-root user 999
    command:
      - /bin/sh
      - -ec
      - |
        REDIS_PASSWORD="$$(cat /run/secrets/redis_password)"
        exec redis-server \
          --maxmemory ${REDIS_MAXMEMORY:-128mb} \
          --maxmemory-policy allkeys-lru \
          --appendonly yes \
          --requirepass "$$REDIS_PASSWORD"
    volumes:
      - pmdl_redis_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping"]
      start_period: 30s
    networks:
      - app-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-256M}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION:-64M}

  # MinIO S3-compatible storage
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: pmdl_minio
    profiles:
      - minio
    restart: unless-stopped
    # Security: cap_drop + no-new-privileges but NOT read_only.
    # WO-070 attempted non-root/read_only and failed due to /data permissions.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: server /data --console-address ":9001"
    secrets:
      - minio_root_user
      - minio_root_password
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    volumes:
      - pmdl_minio_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      start_period: 30s
    networks:
      - app-internal
      - proxy-external
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN}`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${MINIO_MEMORY_RESERVATION:-128M}

# --------------------------------------------------------------
# SECRETS
# --------------------------------------------------------------

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  mysql_root_password:
    file: ./secrets/mysql_root_password
  mongodb_root_password:
    file: ./secrets/mongodb_root_password
  redis_password:
    file: ./secrets/redis_password
  minio_root_user:
    file: ./secrets/minio_root_user
  minio_root_password:
    file: ./secrets/minio_root_password
  dashboard_username:
    file: ./secrets/dashboard_username
  dashboard_password:
    file: ./secrets/dashboard_password

# --------------------------------------------------------------
# VOLUMES
# --------------------------------------------------------------

volumes:
  # Foundation
  pmdl_traefik_acme:
    driver: local

  # Supporting Tech
  pmdl_postgres_data:
    driver: local
  pmdl_mysql_data:
    driver: local
  pmdl_mongodb_data:
    driver: local
  pmdl_redis_data:
    driver: local
  pmdl_minio_data:
    driver: local

# --------------------------------------------------------------
# NETWORKS
# --------------------------------------------------------------

networks:
  # Internal network for Docker socket proxy
  # Only socket-proxy and traefik should be on this network
  socket-proxy:
    internal: true
    name: pmdl_socket-proxy

  # Database network - only databases and apps that need DB access
  # Not accessible from internet or proxy
  db-internal:
    internal: true
    name: pmdl_db-internal

  # App-to-app communication network
  # Internal services that don't need direct internet access
  app-internal:
    internal: true
    name: pmdl_app-internal

  # Proxy-external network - services that need Traefik routing
  # This is where services that have Traefik labels should be
  proxy-external:
    name: pmdl_proxy-external
