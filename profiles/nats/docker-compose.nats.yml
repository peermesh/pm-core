#         reservations:
#           memory: 512M

# ==============================================================
# Secrets
# ==============================================================

secrets:
  # NATS authentication token
  # Generate with: openssl rand -hex 32 > ./secrets/nats_auth_token
  nats_auth_token:
    file: ./secrets/nats_auth_token

# ==============================================================
# Volumes
# ==============================================================

volumes:
  # NATS JetStream data volume
  # Contains: stream data, consumer state, cluster metadata (if clustered)
  pmdl_nats_data:
    driver: local
    # For attached block storage, use:
    # driver_opts:
    #   type: none
    #   device: /mnt/block-storage/nats
    #   o: bind

# ==============================================================
# Networks
# ==============================================================

networks:
  # Internal application network (app-to-app communication)
  # Per ADR-0002 four-network topology
  app-internal:
    internal: true
    name: pmdl_app-internal
