<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Docker Lab Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dark { background-color: #0f172a; color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-900">
    <div class="w-full max-w-md p-8">
        <div class="bg-slate-800 rounded-lg shadow-xl p-8 border border-slate-700">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-white">Docker Lab Dashboard</h1>
                <p class="text-slate-400 mt-2">Sign in to continue</p>
            </div>

            <form action="/api/login" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-2">
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        autocomplete="username"
                        class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter username"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-2">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        autocomplete="current-password"
                        class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter password"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-800"
                >
                    Sign In
                </button>
            </form>

            <div id="error" class="mt-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 text-sm hidden">
                Invalid username or password
            </div>
        </div>

        <p class="text-center text-slate-500 text-sm mt-6">
            PeerMesh Docker Lab
        </p>
    </div>

    <script>
        // Show error if redirected back with error
        if (window.location.search.includes('error=1')) {
            document.getElementById('error').classList.remove('hidden');
        }
    </script>
</body>
</html>
