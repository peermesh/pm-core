# ==============================================================
# Peer Mesh Docker Lab - Security Hardening Overlay
# ==============================================================
#
# STATUS: MOSTLY REDUNDANT (preserved for reference)
#
#   As of WO-119/WO-122, the base docker-compose.yml now includes
#   all security hardening (security_opt, cap_drop, cap_add,
#   read_only, tmpfs) for every service. The only addition this
#   overlay still provides is dashboard read_only + tmpfs.
#
#   The previous database entrypoint overrides (00-readonly-wrapper.sh)
#   have been removed because the base compose now handles read_only
#   natively with proper tmpfs mounts.
#
# USAGE:
#   docker compose -f docker-compose.yml -f docker-compose.hardening.yml up -d
#
# ==============================================================

services:

  # ----------------------------------------------------------
  # Dashboard - add read_only + tmpfs (not yet in base compose)
  # ----------------------------------------------------------
  dashboard:
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
