name: Validate

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .
          strict: false

  compose-validate:
    name: Compose Syntax
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [lite, core, full]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose syntax
        run: |
          docker compose --profile ${{ matrix.profile }} config --quiet
          echo "Profile ${{ matrix.profile }} validated successfully"

      - name: Check for deprecated syntax
        run: |
          # Check for deprecated version field
          if grep -rE "^version:" docker-compose*.yml 2>/dev/null; then
            echo "::warning::Deprecated 'version' field found in compose files"
          fi

  json-yaml-validate:
    name: JSON/YAML Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON and YAML
        uses: GrantBirki/json-yaml-validate@v3
        with:
          comment: "true"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: 'tests/lib'

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          skip-dirs: 'tests/lib'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # Find all shell scripts and check them
          find . -type f -name "*.sh" -not -path "./.git/*" -exec shellcheck -S error {} + || true

  module-contract-gate:
    name: Module Contract Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Run contract gate
        run: |
          chmod +x scripts/validation/module-contract-gate.sh
          ./scripts/validation/module-contract-gate.sh

  module-data-composition-gate:
    name: Module Data Composition Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run composition contract gate
        run: |
          chmod +x scripts/validation/module-data-composition-gate.sh
          ./scripts/validation/module-data-composition-gate.sh

  social-protocol-contract-tests:
    name: Social Protocol Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/social/app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: modules/social/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run protocol contract tests
        run: npm test

  dockerfile-base-image-policy:
    name: Dockerfile Base Image Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Dockerfile base image policy validator
        run: |
          chmod +x scripts/security/validate-dockerfile-base-image-policy.sh
          ./scripts/security/validate-dockerfile-base-image-policy.sh --max-warnings 0
