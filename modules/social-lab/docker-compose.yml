# ==============================================================
# Social Lab Module - Docker Compose Configuration
# ==============================================================
# PeerMesh Social Lab: social identity/profile backbone module.
#
# This file defines:
#   - Node.js application service (social-lab-app)
#   - Extends foundation _service-standard (512MB RAM, 1 CPU)
#   - Traefik HTTPS routing to ${SOCIAL_LAB_SUBDOMAIN}.${DOMAIN}
#   - PostgreSQL connection via db-internal network
#   - File-based secrets for database credentials
#   - Security hardening (cap_drop ALL, no-new-privileges)
#
# Prerequisites:
#   - Foundation stack running (Traefik, PostgreSQL profile)
#   - DOMAIN environment variable set
#   - Database secret files created
#
# Deploy:
#   cd modules/social-lab
#   docker compose up -d
# ==============================================================

services:
  # ==========================================================================
  # Social Lab Application Server
  # ==========================================================================
  social-lab-app:
    extends:
      file: ../../foundation/docker-compose.base.yml
      service: _service-standard

    # Build from app/Dockerfile (installs npm dependencies in image)
    build: ./app

    container_name: social-lab-app

    # Environment configuration
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SOCIAL_LAB_PORT=${SOCIAL_LAB_PORT:-3000}
      - SOCIAL_LAB_DB_HOST=${SOCIAL_LAB_DB_HOST:-postgres}
      - SOCIAL_LAB_DB_PORT=${SOCIAL_LAB_DB_PORT:-5432}
      - SOCIAL_LAB_DB_NAME=${SOCIAL_LAB_DB_NAME:-social_lab}
      - SOCIAL_LAB_DB_USER=${SOCIAL_LAB_DB_USER:-social_lab}
      - SOCIAL_LAB_SUBDOMAIN=${SOCIAL_LAB_SUBDOMAIN:-}
      - DOMAIN=${DOMAIN}
      # Password injected via secret file mount, read at app startup

    # Secrets (file-based, per foundation security standards)
    secrets:
      - social_lab_db_password
      - social_lab_session_secret

    # Volume mounts
    volumes:
      - social-lab-data:/data

    # Working directory
    working_dir: /app

    # Health check: HTTP GET to /health endpoint
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--timeout=2", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

    # Networks: proxy-external for Traefik routing + db-internal for PostgreSQL
    networks:
      - proxy-external
      - db-internal

    # Depends on: nothing at compose level (foundation PostgreSQL is in a separate compose)
    # The install hook validates PostgreSQL connectivity before start

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    # Tmpfs for Node.js runtime needs (read_only requires this)
    tmpfs:
      - /tmp:size=64M

    # Traefik routing labels
    labels:
      - "traefik.enable=true"

      # Service: forward to app port 3000
      - "traefik.http.services.social-lab.loadbalancer.server.port=3000"

      # Root domain router: ${DOMAIN} itself (e.g., peers.social)
      # This is the canonical router for root-domain deployments.
      - "traefik.http.routers.social-lab-root.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.social-lab-root.entrypoints=websecure"
      - "traefik.http.routers.social-lab-root.tls.certresolver=letsencrypt"
      - "traefik.http.routers.social-lab-root.service=social-lab"

      # Subdomain router: ${SOCIAL_LAB_SUBDOMAIN}.${DOMAIN} (e.g., social.dockerlab.peermesh.org)
      # Only active when SOCIAL_LAB_SUBDOMAIN is set (non-empty).
      # For root-domain deployments (peers.social), leave SOCIAL_LAB_SUBDOMAIN empty
      # and the root router above handles all traffic.
      - "traefik.http.routers.social-lab.rule=Host(`${SOCIAL_LAB_SUBDOMAIN:-_disabled_}.${DOMAIN}`)"
      - "traefik.http.routers.social-lab.entrypoints=websecure"
      - "traefik.http.routers.social-lab.tls.certresolver=letsencrypt"

      # ActivityPub router: ap.${DOMAIN} (e.g., ap.peers.social)
      - "traefik.http.routers.social-lab-ap.rule=Host(`ap.${DOMAIN}`)"
      - "traefik.http.routers.social-lab-ap.entrypoints=websecure"
      - "traefik.http.routers.social-lab-ap.tls.certresolver=letsencrypt"
      - "traefik.http.routers.social-lab-ap.service=social-lab"

# ==============================================================
# Secrets
# ==============================================================
secrets:
  social_lab_db_password:
    file: ./secrets/social_lab_db_password
  social_lab_session_secret:
    file: ./secrets/social_lab_session_secret

# ==============================================================
# Volumes
# ==============================================================
volumes:
  social-lab-data:
    name: social-lab-data

# ==============================================================
# Networks
# ==============================================================
networks:
  proxy-external:
    external: true
    name: pmdl_proxy-external
  db-internal:
    external: true
    name: pmdl_db-internal
